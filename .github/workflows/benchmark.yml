name: Run TypeScript Benchmark

permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'


jobs:
  benchmark:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            submodules: true
      - name: Print runner spec
        run: |
          echo "CPU cores:"
          nproc
          echo "Memory:"
          free -h
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine
      - name: Install dependencies
        run: npm install
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Install real-world fixture dependencies
        run: cd fixtures/real-world/zod && pnpm install --filter zod...
      - name: Generate synthetic fixtures
        run: |
          node fixtures/synthetic/generate.ts --files 10 --linesPerFile 50
          node fixtures/synthetic/generate.ts --files 10 --linesPerFile 1500
          node fixtures/synthetic/generate.ts --files 20 --linesPerFile 6000
      - name: Run benchmark
        run: ./scripts/run-bench.sh
      - name: Collect results
        run: node scripts/collect-results.ts
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Update benchmark results" || echo "No changes to commit"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push
      - name: Build site
        run: |
          cd site
          npm install
          npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
