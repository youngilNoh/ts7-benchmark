name: Run TypeScript Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Print runner spec
        run: |
          echo "CPU cores:"
          nproc
          echo "Memory:"
          free -h
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine
      - name: Verify installs
        run: |
          node -v
          hyperfine --version
